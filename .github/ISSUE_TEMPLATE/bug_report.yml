name: Bug report
description: Report a BoomInstaller bug on supported XPad firmware

body:
  - type: checkboxes
    id: requirements
    attributes:
      label: Before submitting
      options:
        - label: I installed a production APK from the official BoomInstaller or xpad2 release
          required: true
        - label: I removed device serials, ADB keys, tokens, passwords, and private keys from attachments
          required: true

  - type: input
    id: version
    attributes:
      label: BoomInstaller version
      placeholder: 13.6.0.r8
    validations:
      required: true

  - type: input
    id: xpad2_version
    attributes:
      label: xpad2 version, if used
      placeholder: 0.1.1

  - type: dropdown
    id: mode
    attributes:
      label: Activation mode
      options:
        - system (XPad 31317)
        - znxrun (XPad 0044)
        - root
        - not activated
    validations:
      required: true

  - type: input
    id: firmware
    attributes:
      label: Firmware build or fingerprint
      placeholder: /260 or full build fingerprint
    validations:
      required: true

  - type: textarea
    id: reproducer
    attributes:
      label: Reproduction steps
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Actual result and sanitized logs
      description: Prefer an xpad2log archive or a screenshot after removing sensitive data.
    validations:
      required: true

  - type: textarea
    id: expected-behaviour
    attributes:
      label: Expected result
    validations:
      required: true
