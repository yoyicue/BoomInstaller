name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: boominstaller-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  debug-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true

      - name: Build debug APK
        run: ./gradlew --no-daemon :manager:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: BoomInstaller-debug-${{ github.sha }}
          path: manager/build/outputs/apk/debug/BoomInstaller-*-debug.apk
          if-no-files-found: error
          compression-level: 9
